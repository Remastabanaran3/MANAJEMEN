<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Wirausaha</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #334155;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --border-color: #334155;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --success: #34d399;
            --danger: #f87171;
            --nav-bg: rgba(30, 41, 59, 0.85);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.6;
        }

        nav {
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-brand {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menus { display: flex; gap: 12px; }

        .icon-btn {
            background: transparent;
            border: 1px solid transparent;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover { background-color: var(--border-color); transform: translateY(-2px); }
        .icon-btn.active { background-color: var(--border-color); border-color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary); }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .page-section { display: none; opacity: 0; transform: translateY(10px); }
        .page-section.active { display: block; opacity: 1; transform: translateY(0); transition: opacity 0.4s ease, transform 0.4s ease; }

        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .card { background-color: var(--card-bg); padding: 24px; border-radius: 16px; box-shadow: var(--shadow-md); border: 1px solid var(--border-color); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        
        .card h3 { font-size: 0.95rem; margin-bottom: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        [data-theme="dark"] .card h3 { color: #94a3b8; }
        .card h2 { font-size: 2rem; font-weight: 700; user-select: text; -webkit-user-select: text; }
        
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        
        .form-control { 
            width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); 
            border-radius: 10px; background-color: var(--bg-color); color: var(--text-color); 
            font-family: inherit; font-size: 1rem; transition: all 0.2s ease; 
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
        
        button.submit-btn { background-color: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.05rem; font-weight: 600; margin-top: 10px; transition: 0.2s; }
        button.submit-btn:hover { background-color: var(--primary-hover); }
        button.submit-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; background-color: var(--card-bg); user-select: text; -webkit-user-select: text; }
        th { background-color: var(--bg-color); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; color: #64748b; padding: 16px; text-align: left; }
        [data-theme="dark"] th { color: #94a3b8; }
        td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        tbody tr:hover { background-color: var(--bg-color); }
        
        .chart-container { background-color: var(--card-bg); padding: 24px; border-radius: 16px; box-shadow: var(--shadow-md); border: 1px solid var(--border-color); margin-top: 24px; }
        
        #loading-indicator { text-align: center; color: var(--primary); font-weight: bold; padding: 20px; display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-brand">WiraKu</div>
        <div class="nav-menus">
            <button class="icon-btn active" id="btn-dashboard" title="Dashboard">📊</button>
            <button class="icon-btn" id="btn-data" title="Kelola Data">📝</button>
            <button class="icon-btn" id="theme-toggle" title="Ganti Tema">🌙</button>
        </div>
    </nav>

    <div class="container">
        <div id="page-dashboard" class="page-section active">
            <div class="summary-cards">
                <div class="card">
                    <h3>Total Pemasukan</h3>
                    <h2 id="total-in" class="text-success">Rp 0</h2>
                </div>
                <div class="card">
                    <h3>Total Pengeluaran</h3>
                    <h2 id="total-out" class="text-danger">Rp 0</h2>
                </div>
                <div class="card">
                    <h3>Keuntungan Bersih</h3>
                    <h2 id="net-profit">Rp 0</h2>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <div id="page-data" class="page-section">
            <div class="summary-cards">
                <div class="card" style="grid-column: 1 / -1;">
                    <h2>Tambah Transaksi Baru</h2>
                    <br>
                    <form id="tx-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Tanggal Transaksi</label>
                                <input type="date" class="form-control" id="tx-date" required>
                            </div>
                            <div class="form-group">
                                <label>Jenis Transaksi</label>
                                <select class="form-control" id="tx-type" required>
                                    <option value="pemasukan">Pemasukan</option>
                                    <option value="pengeluaran">Pengeluaran</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Keterangan Data</label>
                                <input type="text" class="form-control" id="tx-desc" placeholder="Contoh: Penjualan 10 Kaos, Bayar Tagihan Internet..." required>
                            </div>
                            <div class="form-group full-width">
                                <label>Nominal (Rp)</label>
                                <input type="number" class="form-control" id="tx-amount" required>
                            </div>
                        </div>
                        <button type="submit" class="submit-btn" id="btn-submit">Simpan Data ke Database</button>
                    </form>
                </div>
            </div>

            <div class="card" style="overflow-x: auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2>Riwayat Transaksi</h2>
                    <button id="btn-export" style="background-color: var(--success); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem;">
                        📥 Download Excel (CSV)
                    </button>
                </div>
                
                <div id="loading-indicator">Memuat data dari server...</div>
                
                <table id="tx-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Keterangan</th>
                            <th>Jenis</th>
                            <th>Nominal</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. KONFIGURASI FIREBASE ANDA
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCzy1mn0CgB-FQUFDD-Jkw8r9NrEJCsIxs",
            authDomain: "manajemen-4a6dd.firebaseapp.com",
            databaseURL: "https://manajemen-4a6dd-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "manajemen-4a6dd",
            storageBucket: "manajemen-4a6dd.firebasestorage.app",
            messagingSenderId: "776300112072",
            appId: "1:776300112072:web:29c74702330cfec61c9dfd",
            measurementId: "G-15ENCDZ4JR"
        };

        // Inisialisasi Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const transactionsRef = database.ref('transactions');

        // ==========================================
        // 2. LOGIKA TEMA (DARK/LIGHT MODE) & NAVIGASI
        // ==========================================
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            if (currentTheme === 'light') { htmlElement.setAttribute('data-theme', 'dark'); themeToggle.textContent = '☀️'; } 
            else { htmlElement.setAttribute('data-theme', 'light'); themeToggle.textContent = '🌙'; }
            updateChart();
        });

        const btnDashboard = document.getElementById('btn-dashboard');
        const btnData = document.getElementById('btn-data');
        const pageDashboard = document.getElementById('page-dashboard');
        const pageData = document.getElementById('page-data');

        function switchPage(page) {
            btnDashboard.classList.remove('active'); btnData.classList.remove('active');
            pageDashboard.classList.remove('active'); pageData.classList.remove('active');
            if(page === 'dashboard') { btnDashboard.classList.add('active'); pageDashboard.classList.add('active'); } 
            else { btnData.classList.add('active'); pageData.classList.add('active'); }
        }

        btnDashboard.addEventListener('click', () => switchPage('dashboard'));
        btnData.addEventListener('click', () => switchPage('data'));

        // ==========================================
        // 3. FUNGSI FORMAT DATA & RENDER UI
        // ==========================================
        let transactions = [];
        let financeChart;

        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        const formatDateDisplay = (dateString) => {
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        };

        function updateDashboard() {
            let totalIn = 0, totalOut = 0;
            const tbody = document.querySelector('#tx-table tbody');
            tbody.innerHTML = '';

            // Mengurutkan data dari Firebase berdasarkan tanggal terbaru
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            transactions.forEach(tx => {
                if (tx.type === 'pemasukan') totalIn += tx.amount; else totalOut += tx.amount;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="white-space: nowrap;">${formatDateDisplay(tx.date)}</td>
                    <td><strong>${tx.desc}</strong></td>
                    <td class="${tx.type === 'pemasukan' ? 'text-success' : 'text-danger'}">${tx.type.toUpperCase()}</td>
                    <td>${formatRupiah(tx.amount)}</td>
                `;
                tbody.appendChild(tr);
            });

            const netProfit = totalIn - totalOut;
            document.getElementById('total-in').textContent = formatRupiah(totalIn);
            document.getElementById('total-out').textContent = formatRupiah(totalOut);
            
            const netEl = document.getElementById('net-profit');
            netEl.textContent = formatRupiah(netProfit);
            netEl.className = netProfit >= 0 ? 'text-success' : 'text-danger';

            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('financeChart').getContext('2d');
            const isDark = htmlElement.getAttribute('data-theme') === 'dark';
            const textColor = isDark ? '#e6e6e6' : '#333';
            
            let monthlyData = {};
            
            transactions.forEach(tx => {
                const dateObj = new Date(tx.date);
                const monthKey = dateObj.getFullYear() + '-' + String(dateObj.getMonth() + 1).padStart(2, '0');
                const monthLabel = dateObj.toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });
                
                if(!monthlyData[monthKey]) {
                    monthlyData[monthKey] = { label: monthLabel, in: 0, out: 0 };
                }
                
                if(tx.type === 'pemasukan') monthlyData[monthKey].in += tx.amount;
                else monthlyData[monthKey].out += tx.amount;
            });

            const sortedKeys = Object.keys(monthlyData).sort();
            const labels = sortedKeys.map(k => monthlyData[k].label);
            const inData = sortedKeys.map(k => monthlyData[k].in);
            const outData = sortedKeys.map(k => monthlyData[k].out);

            if(financeChart) financeChart.destroy();

            financeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length > 0 ? labels : ['Belum ada data'],
                    datasets: [
                        { label: 'Pemasukan', data: inData.length > 0 ? inData : [0], backgroundColor: '#10b981' },
                        { label: 'Pengeluaran', data: outData.length > 0 ? outData : [0], backgroundColor: '#ef4444' }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: textColor } } },
                    scales: {
                        y: { ticks: { color: textColor }, grid: { color: isDark ? '#334155' : '#e2e8f0' } },
                        x: { ticks: { color: textColor }, grid: { color: isDark ? '#334155' : '#e2e8f0' } }
                    }
                }
            });
        }

        document.getElementById('tx-date').valueAsDate = new Date();

        // ==========================================
        // 4. KIRIM DATA KE FIREBASE (WRITE)
        // ==========================================
        document.getElementById('tx-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btn-submit');
            const originalText = btnSubmit.textContent;
            btnSubmit.textContent = "Menyimpan ke Cloud...";
            btnSubmit.disabled = true;

            const date = document.getElementById('tx-date').value;
            const type = document.getElementById('tx-type').value;
            const desc = document.getElementById('tx-desc').value;
            const amount = parseFloat(document.getElementById('tx-amount').value);
            
            transactionsRef.push({
                date: date,
                type: type,
                desc: desc,
                amount: amount,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('tx-amount').value = '';
                document.getElementById('tx-desc').value = '';
                btnSubmit.textContent = originalText;
                btnSubmit.disabled = false;
            }).catch((error) => {
                alert("Gagal menyimpan data. Pastikan koneksi internet aktif dan Rules Firebase sudah disetel. Error: " + error.message);
                btnSubmit.textContent = originalText;
                btnSubmit.disabled = false;
            });
        });

        // ==========================================
        // 5. TARIK DATA DARI FIREBASE (REAL-TIME READ)
        // ==========================================
        const loadingIndicator = document.getElementById('loading-indicator');
        loadingIndicator.style.display = 'block';

        transactionsRef.on('value', (snapshot) => {
            transactions = []; 
            
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                transactions.push({
                    id: childSnapshot.key,
                    date: data.date,
                    type: data.type,
                    desc: data.desc,
                    amount: data.amount
                });
            });
            
            loadingIndicator.style.display = 'none';
            updateDashboard();
        });

        // ==========================================
        // 6. FITUR EXPORT KE EXCEL (CSV)
        // ==========================================
        document.getElementById('btn-export').addEventListener('click', function() {
            if (transactions.length === 0) {
                alert("Belum ada data untuk diekspor!");
                return;
            }
            let csvContent = "Tanggal Transaksi,Bulan/Tahun,Keterangan,Jenis Transaksi,Nominal (Rp)\n";
            transactions.forEach(row => { 
                const monthLabel = new Date(row.date).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
                csvContent += `${row.date},${monthLabel},"${row.desc}",${row.type},${row.amount}\n`; 
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "Rekap_Keuangan_WiraKu.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

    </script>
</body>
</html>
